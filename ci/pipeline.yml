---
#@ load("@ytt:data", "data")

#! ************************************
#! Secrets we need to run this pipeline
#! ************************************
secrets:
#! AWS access keys for CFF manage account: 504405067906
- &aws-params
  AWS_ACCESS_KEY: ((bbr_cli_aws_creds.access_key_id))
  AWS_SECRET_KEY: ((bbr_cli_aws_creds.secret_access_key))
  AWS_ASSUMED_ROLE_ARN: ((bbr_cli_aws_creds.role_arn))
  AWS_REGION: eu-north-1

#! They are static values stored in credhub.
- &test-bosh-director-ip 10.244.0.5
- &test-bosh-director-ip-priv-key ((test_bosh_director_ssh_key.private_key))
- &test-bosh-director-ip-pub-key ((test_bosh_director_ssh_key.public_key))

#! **************
#! End of secrets
#! **************
bbr-branch: &bbr-branch master

broker-push-attempts: &broker-push-attempts 2

#! bbl-up/bbl-down params shared across all jobs
bbl-params: &bbl-params
  BBL_IAAS: gcp
  BBL_GCP_SERVICE_ACCOUNT_KEY: ((gcp_json_key))
  BBL_GCP_REGION: europe-west1

#! Recurring mappings to vars loaded via load_var steps.
bbl-env-system-test-director: &bbl-env-system-test-director
  BOSH_ENVIRONMENT: "((.:pooled-env.BOSH_ENVIRONMENT))"
  BOSH_CLIENT: "((.:pooled-env.BOSH_CLIENT))"
  BOSH_CLIENT_SECRET: "((.:pooled-env.BOSH_CLIENT_SECRET))"
  BOSH_CA_CERT: "((.:pooled-env.BOSH_CA_CERT))"
  BOSH_GW_HOST: "((.:pooled-env.INSTANCE_JUMPBOX_EXTERNAL_IP)):22"
  BOSH_GW_USER: "((.:pooled-env.INSTANCE_JUMPBOX_USER))"
  BOSH_GW_PRIVATE_KEY: "((.:pooled-env.INSTANCE_JUMPBOX_PRIVATE))"

bbl-env-system-test-deployment: &bbl-env-system-test-deployment
  BOSH_ENVIRONMENT: "((.:bbl-env.BOSH_ENVIRONMENT))"
  BOSH_CLIENT: "((.:bbl-env.BOSH_CLIENT))"
  BOSH_CLIENT_SECRET: "((.:bbl-env.BOSH_CLIENT_SECRET))"
  BOSH_CA_CERT: "((.:bbl-env.BOSH_CA_CERT))"
  BOSH_GW_HOST: "((.:bbl-env.INSTANCE_JUMPBOX_EXTERNAL_IP)):22"
  BOSH_GW_USER: "((.:bbl-env.INSTANCE_JUMPBOX_USER))"
  BOSH_GW_PRIVATE_KEY: "((.:bbl-env.INSTANCE_JUMPBOX_PRIVATE))"

test-bosh-director-deployment: &test-bosh-director-deployment test-bosh-director

resource_types:

- name: bosh-deployment-resource
  type: registry-image
  source:
    repository: cloudfoundry/bosh-deployment-resource

- name: gcs
  type: registry-image
  source:
    repository: frodenas/gcs-resource

resources:
- name: bosh-ecosystem-registry-image
  type: registry-image
  source:
    repository: bosh/bosh-ecosystem-concourse

- name: bosh-security-scanner-registry-image
  type: registry-image
  source:
    repository: bosh/security-scanner

- name: cf-deployment-concourse-tasks-registry-image
  type: registry-image
  source:
    repository: cloudfoundry/cf-deployment-concourse-tasks

- name: golang-registry-image
  type: registry-image
  source:
    repository: golang

- name: golang-release
  type: git
  source:
    uri: https://github.com/bosh-packages/golang-release.git
    tag_filter: v*
- name: golang-release-image
  type: registry-image
  source:
    repository: ghcr.io/cloudfoundry/bosh/golang-release

- name: bosh-backup-and-restore-test-releases
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-backup-and-restore-test-releases.git
    branch: master

- name: bosh-backup-and-restore
  type: git
  source:
    uri: git@github.com:cloudfoundry/bosh-backup-and-restore.git
    private_key: ((github_deploy_key_bbr-cli.private_key))
    branch: *bbr-branch
    ignore_paths:
    - ci

- name: bosh-backup-and-restore-ci
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-backup-and-restore.git
    branch: *bbr-branch
    paths:
    - ci

- name: homebrew-tap
  type: git
  source:
    uri: git@github.com:cloudfoundry/homebrew-tap
    branch: master
    private_key: ((github_deploy_key_homebrew-tap.private_key))

- name: bosh-shared-ci
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-shared-ci.git

- name: bosh-bootloader
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-bootloader.git
    branch: main

- name: bbr-dev-release
  type: gcs
  source:
    bucket: bosh-backup-and-restore-pipeline
    json_key: ((gcp_json_key))
    versioned_file: bbr-cli/bbr-dev-release.tar

- name: bbr-release
  type: github-release
  source:
    repository: bosh-backup-and-restore
    user: cloudfoundry
    access_token: ((github_public_repo_token))
    release: true

- name: version
  type: semver
  source:
    bucket: bosh-backup-and-restore-pipeline
    key: bosh-backup-and-restore/version
    json_key: ((gcp_json_key))
    driver: gcs

- name: noble-stemcell
  type: bosh-io-stemcell
  source:
    name: bosh-warden-boshlite-ubuntu-noble

- name: jammy-stemcell
  type: bosh-io-stemcell
  source:
    name: bosh-warden-boshlite-ubuntu-jammy-go_agent

- name: bosh-deployment
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-deployment.git

- name: test-bosh-director-deployment
  type: bosh-deployment-resource
  source:
    deployment: *test-bosh-director-deployment
    skip_check: true

- name: s3-config-validator-dev-release
  type: gcs
  source:
    bucket: bosh-backup-and-restore-pipeline
    json_key: ((gcp_json_key))
    versioned_file: validator-test-artifacts/bbr-s3-config-validator

- name: release-notes
  type: gcs
  source:
    bucket: bosh-backup-and-restore-pipeline
    json_key: ((gcp_json_key))
    versioned_file: bosh-backup-and-restore/release-notes.md

- name: cf-deployment-concourse-tasks
  type: git
  source:
    branch: main
    uri: https://github.com/cloudfoundry/cf-deployment-concourse-tasks.git

- name: cf-deployment
  type: git
  source:
    uri: https://github.com/cloudfoundry/cf-deployment.git
    tag_filter: "v57.*"

- name: disaster-recovery-acceptance-tests
  type: git
  source:
    uri: https://github.com/cloudfoundry/disaster-recovery-acceptance-tests
    branch: main

- name: b-drats
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-disaster-recovery-acceptance-tests
    branch: master

- name: every-monday
  type: time
  source:
    initial_version: true
    start: 9:00 AM
    stop: 5:00 PM
    days: [Monday,Friday]
    location: Europe/London

jobs:
- name: system-test-director
  serial: true
  serial_groups: [ system-test-director ]
  plan:
  - do:
    - in_parallel:
      - get: bosh-backup-and-restore
        trigger: true
      - get: bosh-backup-and-restore-ci
      - get: bosh-deployment
      - get: bosh-backup-and-restore-test-releases
      - get: stemcell
        resource: jammy-stemcell
      - get: bosh-bootloader
      - get: bosh-ecosystem-registry-image
    - task: bbl-up
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-up/task.yml
      params:
        <<: *bbl-params
        PIPELINE_JOB: system-test-director
        WARDEN_CONTAINERS_USE_SYSTEMD: false
    - task: extract-bbl-env
      file: bosh-backup-and-restore-ci/ci/tasks/extract-bbl-env/task.yml
    - load_var: pooled-env
      file: bosh-env/metadata.yml
      format: yml
    - task: generate-bosh-deployment-source-file
      image: bosh-ecosystem-registry-image
      file: bosh-backup-and-restore-ci/ci/tasks/bosh-deployment-resource-source-file-adapter/task.yml
      params:
        <<: *bbl-env-system-test-director
    - put: deploy-fake-director
      inputs: all
      resource: test-bosh-director-deployment
      params:
        manifest: bosh-backup-and-restore/fixtures/fake-director.yml
        stemcells: [ stemcell/*.tgz ]
        source_file: source-file/source-file.yml
        vars:
          stemcell-os: ubuntu-jammy
          deployment-name: test-bosh-director
          jumpbox-public-key: *test-bosh-director-ip-pub-key
          test_release_path: /tmp/build/put/bosh-backup-and-restore-test-releases/test-bosh-backup-and-restore-release
          internal_ip: *test-bosh-director-ip
    - task: system-test-director
      image: bosh-ecosystem-registry-image
      file: bosh-backup-and-restore-ci/ci/tasks/bbr-system-director/task.yml
      privileged: true
      params:
        USE_SHUTTLE: false
        DIRECTOR_HOST: *test-bosh-director-ip
        DIRECTOR_SSH_KEY: *test-bosh-director-ip-priv-key
        DIRECTOR_SSH_USERNAME: jumpbox
        BOSH_DEPLOYMENT: *test-bosh-director-deployment
        FIXTURES_DIR: bosh-backup-and-restore/fixtures
        STEMCELL_OS: ubuntu-jammy
        <<: *bbl-env-system-test-director
    - put: delete-system-director
      resource: test-bosh-director-deployment
      params:
        delete:
          enabled: true
        source_file: source-file/source-file.yml
    ensure:
      task: bbl-down
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-down/task.yml
      params:
        <<: *bbl-params

- name: system-test-deployment
  serial: true
  plan:
  - do:
    - in_parallel:
      - get: bosh-backup-and-restore-test-releases
        trigger: true
      - get: bosh-backup-and-restore-ci
      - get: bosh-backup-and-restore
        trigger: true
      - get: stemcell
        resource: jammy-stemcell
      - get: bosh-ecosystem-registry-image
      - get: bosh-deployment
      - get: bosh-bootloader
    - task: bbl-up
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-up/task.yml
      params:
        <<: *bbl-params
        PIPELINE_JOB: system-test-deployment
        WARDEN_CONTAINERS_USE_SYSTEMD: false
    - task: extract-bbl-env
      file: bosh-backup-and-restore-ci/ci/tasks/extract-bbl-env/task.yml
    - load_var: bbl-env
      file: bosh-env/metadata.yml
      format: yml
    - in_parallel:
      - task: upload-stemcell
        image: bosh-ecosystem-registry-image
        file: bosh-backup-and-restore-ci/ci/tasks/upload-stemcell/task.yml
        params:
          <<: *bbl-env-system-test-deployment
      - task: upload-redis-test-release
        image: bosh-ecosystem-registry-image
        file: bosh-backup-and-restore-ci/ci/tasks/bbr-upload-system-test-releases/task.yml
        params:
          RELEASE_NAME: redis-test-release
          <<: *bbl-env-system-test-deployment
      - task: upload-many-bbr-jobs-release
        image: bosh-ecosystem-registry-image
        file: bosh-backup-and-restore-ci/ci/tasks/bbr-upload-system-test-releases/task.yml
        params:
          RELEASE_NAME: many-bbr-jobs-release
          <<: *bbl-env-system-test-deployment
      - task: upload-lock-ordering-release
        image: bosh-ecosystem-registry-image
        file: bosh-backup-and-restore-ci/ci/tasks/bbr-upload-system-test-releases/task.yml
        params:
          RELEASE_NAME: lock-ordering-release
          <<: *bbl-env-system-test-deployment
    - task: system-deployment-with-uaa
      image: bosh-ecosystem-registry-image
      file: bosh-backup-and-restore-ci/ci/tasks/bbr-system-deployment/task.yml
      params:
        FIXTURES_DIR: bosh-backup-and-restore/fixtures
        STEMCELL_OS: ubuntu-jammy
        <<: *bbl-env-system-test-deployment
    ensure:
      task: bbl-down
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-down/task.yml
      params:
        <<: *bbl-params

- name: test-build-s3-config-validator
  serial_groups:
  - only_1_job_should_bump_the_BUILD_VERSION_at_a_time_to_avoid_race_condition
  plan:
  - in_parallel:
    - get: bosh-backup-and-restore-ci
    - get: bosh-backup-and-restore
      trigger: true
    - get: bosh-ecosystem-registry-image
  - task: unit-test
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-s3-config-validator-unit-test/task.yml
    params:
      <<: *aws-params
  - task: e2e-test
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-s3-config-validator-e2e-test/task.yml
    params:
      <<: *aws-params
      AWS_UNVERSIONED_BUCKET: ci-bbr-cli-s3-validator-e2e-unversioned
      AWS_VERSIONED_BUCKET: ci-bbr-cli-s3-validator-e2e-versioned
  - task: build
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-s3-config-validator-build/task.yml
  - put: s3-config-validator-dev-release
    params:
      file: bbr-s3-config-validator-build/bbr-s3-config-validator

- name: validate-aws-s3-config
  serial: true
  plan:
  - in_parallel:
    - get: s3-config-validator-dev-release
      passed: [ test-build-s3-config-validator ]
      trigger: true
    - get: bosh-backup-and-restore-ci
    - get: bosh-backup-and-restore
      passed: [ test-build-s3-config-validator ]
    - get: bosh-ecosystem-registry-image
  - task: run-validator
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-s3-config-validator-validate-aws-s3-config/task.yml
    params:
      <<: *aws-params
      AWS_UNVERSIONED_BUCKET_LIVE: ci-bbr-cli-s3-validator-test-live
      AWS_UNVERSIONED_BUCKET_BACKUP: ci-bbr-cli-s3-validator-test-backup

- name: release-fan-in
  plan:
  - in_parallel:
    - get: bosh-backup-and-restore
      passed: [ system-test-deployment, system-test-director, validate-aws-s3-config ]
      trigger: true

- name: build-dev
  plan:
  - in_parallel:
    - get: bosh-backup-and-restore-ci
    - get: bosh-backup-and-restore
      trigger: true
      passed: [release-fan-in]
    - get: bosh-ecosystem-registry-image
  - task: build-bbr
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-build/task.yml
  - task: build-s3-config-validator
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-s3-config-validator-build/task.yml
  - put: bbr-dev-release
    params:
      file: bbr-build/bbr-*.tar

- name: run-drats
  serial: true
  plan:
  - do:
    - in_parallel:
      - get: bosh-backup-and-restore-ci
      - get: bosh-backup-and-restore
        passed: [build-dev]
      - get: cf-deployment
      - get: cf-deployment-concourse-tasks
      - get: disaster-recovery-acceptance-tests
      - get: bosh-bootloader
      - get: bosh-deployment
      - get: bosh-ecosystem-registry-image
      - get: cf-deployment-concourse-tasks-registry-image
      - get: bbr-dev-release
        trigger: true
        passed: [build-dev]
    - task: bbl-up
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-up/task.yml
      params:
        <<: *bbl-params
        PIPELINE_JOB: run-drats
    - task: extract-bbl-env
      file: bosh-backup-and-restore-ci/ci/tasks/extract-bbl-env/task.yml
    - load_var: bbl-env
      file: bosh-env/metadata.yml
      format: yml
    - task: patch-bpm-cgroup-v2-fix
      image: bosh-ecosystem-registry-image
      config:
        platform: linux
        inputs:
        - name: cf-deployment
        outputs:
        - name: cf-deployment-with-bpm-fix
        run:
          path: bash
          args:
          - -c
          - |
            cp -r cf-deployment/. cf-deployment-with-bpm-fix/

            # Dynamically extract the stemcell version that the compiled releases target,
            # and pin the manifest to it so BOSH can reuse the pre-compiled packages
            # without recompilation.
            stemcell_version=$(grep -A2 'stemcell:' cf-deployment/operations/use-compiled-releases.yml \
              | grep 'version:' | head -1 | grep -oE '"[0-9.]+"' | tr -d '"')
            echo "Pinning deployment stemcell to compiled-releases version: ${stemcell_version}"
            cat > cf-deployment-with-bpm-fix/operations/bbr-stemcell-version.yml << OPSEOF
            - path: /stemcells/alias=default/version
              type: replace
              value: "${stemcell_version}"
            OPSEOF

            cat > cf-deployment-with-bpm-fix/operations/bbr-bpm-cgroup-fix.yml << 'OPSEOF'
            - path: /releases/name=bpm
              type: replace
              value:
                name: bpm
                sha1: caceac3d35c926cfc76944d08bedf019d3fd4178
                url: https://bosh.io/d/github.com/cloudfoundry/bpm-release?v=1.4.33
                version: 1.4.33
            OPSEOF

            # Serialize instance group updates to prevent simultaneous BPM systemd scope
            # creation across multiple noble warden containers, which causes cgroup
            # resource contention in the shared host cgroup tree.
            cat > cf-deployment-with-bpm-fix/operations/bbr-serial-deployment.yml << 'OPSEOF'
            - path: /update/serial?
              type: replace
              value: true
            OPSEOF

            # Add BOSH DNS wildcard alias for *.bosh-lite.com → router IP (10.244.0.34).
            # In noble warden containers, systemd-resolved forwards ALL queries to BOSH DNS
            # (169.254.0.2). Since bosh-lite.com has no public DNS records, BOSH DNS returns
            # SERVFAIL for api.bosh-lite.com (needed by nfsbrokerpush/smbbrokerpush errands),
            # which manifests as "server misbehaving". The wildcard alias makes BOSH DNS
            # authoritatively resolve all *.bosh-lite.com subdomains to the CF router.
            cat > cf-deployment-with-bpm-fix/operations/bbr-bosh-lite-dns.yml << 'OPSEOF'
            - path: /addons/name=bosh-dns-aliases/jobs/name=bosh-dns-aliases/properties/aliases/-
              type: replace
              value:
                domain: "_.bosh-lite.com"
                targets:
                - query: '*'
                  instance_group: router
                  deployment: cf
                  network: default
                  domain: bosh
            OPSEOF

            # In noble CF VMs, systemd-resolved (at 169.254.0.53) only routes internal CF
            # domains (*.service.cf.internal, *.bosh) to BOSH DNS. External domains are
            # routed to GCP's link-local metadata DNS (169.254.169.254), which is not
            # reachable from within the 10.244.x.x warden network, causing SERVFAIL
            # ("server misbehaving") during buildpack dependency downloads (e.g.
            # buildpacks.cloudfoundry.org). The silk-cni job — NOT garden — controls the
            # DNS servers written to each container's /etc/resolv.conf. Adding 8.8.8.8 as
            # a second entry provides a fallback that resolvers (glibc, Go) use when
            # 169.254.0.53 returns SERVFAIL, while keeping 169.254.0.53 first so that
            # BOSH service-discovery and bosh-dns aliases continue to work.
            cat > cf-deployment-with-bpm-fix/operations/bbr-garden-dns.yml << 'OPSEOF'
            - path: /instance_groups/name=diego-cell/jobs/name=silk-cni/properties/dns_servers
              type: replace
              value:
              - 169.254.0.53
              - 8.8.8.8
            OPSEOF

    - task: deploy-backup-restore-components
      image: cf-deployment-concourse-tasks-registry-image
      file: cf-deployment-concourse-tasks/bosh-deploy/task.yml
      input_mapping:
        ops-files: cf-deployment-with-bpm-fix
      params:
        BBL_STATE_DIR: "."
        SYSTEM_DOMAIN: bosh-lite.com
        BOSH_LITE: true
        OPS_FILES: >
          operations/bosh-lite.yml
          operations/scale-to-one-az.yml
          operations/use-compiled-releases.yml
          operations/use-postgres.yml
          operations/backup-and-restore/enable-backup-restore.yml
          operations/enable-nfs-volume-service.yml
          operations/experimental/disable-interpolate-service-bindings.yml
          operations/experimental/enable-traffic-to-internal-networks.yml
          operations/enable-smb-volume-service.yml
          operations/backup-and-restore/skip-backup-restore-droplets-and-packages.yml
          operations/bbr-stemcell-version.yml
          operations/bbr-bpm-cgroup-fix.yml
          operations/bbr-serial-deployment.yml
          operations/bbr-bosh-lite-dns.yml
          operations/bbr-garden-dns.yml
    - task: bosh-run-errand-nfsbrokerpush
      image: cf-deployment-concourse-tasks-registry-image
      attempts: *broker-push-attempts
      file: cf-deployment-concourse-tasks/run-errand/task.yml
      params:
        BBL_STATE_DIR: "."
        ERRAND_NAME: nfsbrokerpush
    - task: bosh-run-errand-smbbrokerpush
      image: cf-deployment-concourse-tasks-registry-image
      attempts: *broker-push-attempts
      file: cf-deployment-concourse-tasks/run-errand/task.yml
      params:
        BBL_STATE_DIR: "."
        ERRAND_NAME: smbbrokerpush
    - task: update-integration-config
      image: cf-deployment-concourse-tasks-registry-image
      file: bosh-backup-and-restore-ci/ci/tasks/setup-drats-integration-config/task.yml
      input_mapping:
        integration-configs: disaster-recovery-acceptance-tests
        cf-deployment-env: bbl-state
      params:
        SYSTEM_DOMAIN: bosh-lite.com
    - task: acceptance-tests
      image: cf-deployment-concourse-tasks-registry-image
      privileged: true
      input_mapping:
        drats-integration-config: updated-integration-configs
        bbr-binary-release: bbr-dev-release
      config:
        platform: linux
        inputs:
        - name: disaster-recovery-acceptance-tests
          path: src/github.com/cloudfoundry/disaster-recovery-acceptance-tests
        - name: bbr-binary-release
        - name: drats-integration-config
        run:
          path: bash
          args:
          - -c
          - |
            set -eu

            export CONFIG="$PWD/drats-integration-config/ci/integration_config.json"
            export GOPATH=$PWD
            export PATH=$PATH:$GOPATH/bin

            BOSH_GW_USER=$(jq -r .ssh_proxy_user "${CONFIG}")
            BOSH_GW_HOST=$(jq -r .ssh_proxy_host "${CONFIG}")
            BOSH_GW_PRIVATE_KEY=$(jq -r .ssh_proxy_private_key "${CONFIG}")
            DIRECTOR_SSH_KEY=$(jq -r '.director_ssh_private_key // empty' "${CONFIG}")
            DIRECTOR_IP=$(jq -r '.bosh_environment' "${CONFIG}" | sed 's|https://||' | cut -d: -f1)

            eval "$(ssh-agent)"
            rm -f ~/.gitconfig
            echo "${BOSH_GW_PRIVATE_KEY}" > ssh.pem
            chmod 0400 ssh.pem
            ssh-add ssh.pem

            if [ -z "${DIRECTOR_SSH_KEY}" ]; then
              echo "ERROR: director_ssh_private_key not found in integration config"
              exit 1
            fi
            echo "${DIRECTOR_SSH_KEY}" > director-ssh.pem
            chmod 0400 director-ssh.pem

            export BOSH_ALL_PROXY="ssh+socks5://${BOSH_GW_USER}@${BOSH_GW_HOST}:22?private-key=$(pwd)/ssh.pem"
            echo "Configured BOSH_ALL_PROXY to $BOSH_ALL_PROXY"

            # bosh-lite.com has no public DNS records, so all *.bosh-lite.com subdomains
            # (CF API, UAA, app routes, etc.) must be resolved locally. We use dnsmasq
            # to resolve them to the CF router IP (10.244.0.34) and sshuttle to route
            # all 10.244.x.x traffic through the BOSH director VM.
            #
            # We tunnel through the DIRECTOR (not the jumpbox) because the director has
            # the warden bridge interface and can natively reach all container IPs. This
            # avoids the intermittently broken GCP VPC route (next_hop_ip=10.0.0.6) +
            # GCP-level canIpForward requirement that caused ~50% of builds to fail.
            # The director is reached via ProxyJump through the jumpbox; that hop uses
            # direct GCP subnet routing (10.0.0.0/24 LAN), which is always reliable.
            if ! command -v sshuttle &>/dev/null || ! command -v dnsmasq &>/dev/null; then
              echo "Installing sshuttle and dnsmasq..."
              apt-get update -qq && apt-get install -y -q sshuttle dnsmasq
            fi

            UPSTREAM_DNS=$(grep "^nameserver" /etc/resolv.conf | head -1 | awk '{print $2}')

            mkdir -p /etc/dnsmasq.d
            echo "address=/bosh-lite.com/10.244.0.34" > /etc/dnsmasq.d/bosh-lite.conf
            cat > /etc/dnsmasq.conf << EOF
            port=53
            listen-address=127.0.0.1
            bind-interfaces
            server=${UPSTREAM_DNS}
            no-resolv
            conf-dir=/etc/dnsmasq.d/,*.conf
            EOF

            dnsmasq &
            sleep 2

            echo "nameserver 127.0.0.1" > /etc/resolv.conf
            echo "nameserver ${UPSTREAM_DNS}" >> /etc/resolv.conf

            sshuttle -r "jumpbox@${DIRECTOR_IP}" 10.244.0.0/16 \
              --daemon \
              --pidfile=/tmp/sshuttle.pid \
              -e "ssh -i director-ssh.pem \
                  -o StrictHostKeyChecking=no \
                  -o UserKnownHostsFile=/dev/null \
                  -o ServerAliveInterval=60 \
                  -o ServerAliveCountMax=30 \
                  -J ${BOSH_GW_USER}@${BOSH_GW_HOST}"

            # Poll until the CF API is actually reachable (confirms the SSH tunnel
            # is up and the gorouter is responding) before running DRATS.
            echo "Waiting for CF API to be reachable via sshuttle tunnel..."
            MAX_WAIT=300
            ELAPSED=0
            while true; do
              HTTP_STATUS=$(curl -sk --max-time 20 -o /dev/null -w "%{http_code}" "https://api.bosh-lite.com" 2>/dev/null || true)
              if [ -n "${HTTP_STATUS}" ] && [ "${HTTP_STATUS}" -ge 200 ] 2>/dev/null; then
                echo "CF API is reachable (HTTP ${HTTP_STATUS})"
                break
              fi
              if [ "${ELAPSED}" -ge "${MAX_WAIT}" ]; then
                echo "ERROR: CF API not reachable after ${MAX_WAIT}s (last status: '${HTTP_STATUS}')"

                echo "=== sshuttle process check ==="
                ps aux | grep -v grep | grep sshuttle || echo "sshuttle NOT in process list"

                echo "=== director routing table and gorouter TCP check ==="
                ssh -i director-ssh.pem \
                  -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                  -J "${BOSH_GW_USER}@${BOSH_GW_HOST}" \
                  "jumpbox@${DIRECTOR_IP}" \
                  "echo '--- ip route ---'; ip route show; \
                   echo '--- TCP check 10.244.0.34:443 ---'; echo TCP: \$(timeout 5 bash -c 'echo > /dev/tcp/10.244.0.34/443' && echo OK || echo FAIL); \
                   echo '--- iptables FORWARD ---'; sudo iptables -L FORWARD -n -v 2>/dev/null || true; \
                   echo '--- ip_forward ---'; cat /proc/sys/net/ipv4/ip_forward; \
                   echo '--- warden bridge ---'; ip addr show bosh-lite0 2>/dev/null || ip link show 2>/dev/null" \
                  2>&1 || echo "SSH to director failed"

                echo "=== verbose curl to CF API via sshuttle ==="
                curl -vk --max-time 15 "https://api.bosh-lite.com" 2>&1 || true

                exit 1
              fi
              echo "CF API not yet reachable (status='${HTTP_STATUS}', ${ELAPSED}s elapsed), retrying in 10s..."
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done

            pushd bbr-binary-release
              tar xvf ./*.tar
              export BBR_BUILD_PATH="$PWD/releases/bbr"
            popd

            pushd src/github.com/cloudfoundry/disaster-recovery-acceptance-tests
              scripts/_run_acceptance_tests.sh
            popd
    ensure:
      task: bbl-down
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-down/task.yml
      params:
        <<: *bbl-params

- name: run-b-drats
  serial: true
  plan:
  - do:
    - in_parallel:
      - get: bosh-backup-and-restore-ci
      - get: bosh-backup-and-restore
        passed: [build-dev]
      - get: b-drats
      - get: bbr-dev-release
        trigger: true
        params: {unpack: true}
        passed: [build-dev]
      - get: stemcell
        resource: noble-stemcell
      - get: bosh-ecosystem-registry-image
      - get: bosh-deployment
      - get: bosh-bootloader
    - task: bbl-up
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-up/task.yml
      params:
        <<: *bbl-params
        PIPELINE_JOB: run-b-drats
        DISABLE_HM_RESURRECTOR: true
    - task: extract-bbl-env
      file: bosh-backup-and-restore-ci/ci/tasks/extract-bbl-env/task.yml
    - load_var: bbl-env
      file: bosh-env/metadata.yml
      format: yml
    - task: create-b-drats-config
      file: bosh-backup-and-restore-ci/ci/tasks/setup-b-drats-integration-config/task.yml
      input_mapping:
        environment: bbl-state
      output_mapping:
        config: b-drats-config
      params:
        INCLUDE_DEPLOYMENT_TESTCASE: true
        INCLUDE_TRUNCATE_DB_BLOBSTORE_TESTCASE: false
        INCLUDE_CREDHUB_TESTCASE: false
        TIMEOUT_IN_MINUTES: 2880
    - task: run-b-drats
      image: bosh-ecosystem-registry-image
      file: b-drats/ci/tasks/run-b-drats/task.yml
      privileged: true
      input_mapping:
        bosh-disaster-recovery-acceptance-tests: b-drats
        bbr-binary-release: bbr-dev-release
        b-drats-integration-config: b-drats-config
        environment: bbl-state
      params:
        JUMPBOX_IP: ((.:bbl-env.INSTANCE_JUMPBOX_EXTERNAL_IP))
        JUMPBOX_PRIVATE_KEY: ((.:bbl-env.INSTANCE_JUMPBOX_PRIVATE))
        JUMPBOX_USER: ((.:bbl-env.INSTANCE_JUMPBOX_USER))
        BBR_BINARY: bbr-binary-release/releases/bbr
        SSH_ALIVE_INTERVAL: 60
        GINKGO_TIMEOUT: 48h0m0s
    ensure:
      task: bbl-down
      file: bosh-backup-and-restore-ci/ci/tasks/bbl-down/task.yml
      params:
        <<: *bbl-params

- name: release-new-patch
  serial_groups:
    - version
  plan:
    - put: version
      params:
        bump: patch

- name: release-new-minor
  serial_groups:
    - version
  plan:
    - put: version
      params:
        bump: minor

- name: release-new-major
  serial_groups:
    - version
  plan:
    - put: version
      params:
        bump: major

- name: automatically-release-new-patch
  serial_groups: [version]
  plan:
  - in_parallel:
    - get: bosh-backup-and-restore-ci
    - get: bosh-backup-and-restore
      trigger: true
      passed:
      - run-drats
      - run-b-drats
    - get: current-version
      resource: version
    - get: patched-version
      resource: version
      params:
        bump: patch
    - get: bosh-shared-ci
    - get: bosh-security-scanner-registry-image
  - try:
      task: check-for-patched-cves
      file: bosh-shared-ci/tasks/release/check-for-patched-cves.yml
      image: bosh-security-scanner-registry-image
      input_mapping:
        input_repo: bosh-backup-and-restore
        version: current-version
      params:
        SEVERITY: CRITICAL,HIGH
      on_success:
        do:
          - put: release-notes
            params:
              file: release-notes/release-notes.md
          - put: version
            params:
              file: patched-version/version
  - task: ensure-cve-checker-succeeded
    file: bosh-shared-ci/tasks/release/ensure-task-succeeded.yml
    image: bosh-security-scanner-registry-image
    input_mapping:
      task-output-folder: patched_cves

- name: publish-release
  disable_manual_trigger: true
  serial_groups: [version]
  plan:
  - in_parallel:
    - get: bosh-backup-and-restore-ci
    - get: bosh-backup-and-restore
      passed:
      - run-drats
      - run-b-drats
    - get: version
      trigger: true
    - get: bosh-ecosystem-registry-image
    - get: release-notes
  - load_var: version-number
    file: version/version
  - task: build-bbr
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-build/task.yml
  - task: build-s3-config-validator
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-s3-config-validator-build/task.yml
  - task: package-release
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/package-release/task.yml
  - put: bbr-release
    params:
      name: version/version
      tag: version/version
      tag_prefix: v
      body: release-notes/release-notes.md
      commitish: bosh-backup-and-restore/.git/ref
      generate_release_notes: true
      globs:
      - packaged-release/*
  - put: release-notes
    params:
      file: release_metadata/empty-file

- name: update-homebrew-formula
  serial: true
  plan:
  - in_parallel:
    - get: homebrew-tap
    - get: bbr-release
      passed:
      - publish-release
      trigger: true
    - get: bosh-backup-and-restore-ci
    - get: bosh-backup-and-restore
      passed:
      - publish-release
    - get: bosh-ecosystem-registry-image
  - task: update-homebrew-formula
    image: bosh-ecosystem-registry-image
    file: bosh-backup-and-restore-ci/ci/tasks/bbr-update-homebrew-formula/task.yml
  - put: homebrew-tap
    params:
      repository: updated-homebrew-tap
      rebase: true

- name: bump-deps-bbr-cli
  plan:
  - in_parallel:
    - get: golang-release-image
    - get: every-monday
      trigger: true
    - get: bosh-backup-and-restore
    - get: bosh-backup-and-restore-ci
    - get: golang-release
    - get: golang-registry-image
  - task: bump-deps
    file: golang-release/ci/tasks/shared/bump-deps.yml
    image: golang-release-image
    input_mapping:
      input_repo: bosh-backup-and-restore
    output_mapping:
      output_repo: bosh-backup-and-restore
  - task: lint
    file: bosh-backup-and-restore-ci/ci/tasks/run-make/task.yml
    image: golang-registry-image
    params:
      MAKE_TARGET: lint
  - task: test
    file: bosh-backup-and-restore-ci/ci/tasks/run-make/task.yml
    image: golang-registry-image
    params:
      MAKE_TARGET: test-unit
  - put: bosh-backup-and-restore
    params:
      repository: bosh-backup-and-restore
      rebase: true

- name: bump-deps-s3-config-validator
  plan:
  - in_parallel:
    - get: golang-release-image
    - get: every-monday
      trigger: true
    - get: bosh-backup-and-restore
    - get: bosh-backup-and-restore-ci
    - get: golang-release
    - get: golang-registry-image
  - task: bump-deps
    file: golang-release/ci/tasks/shared/bump-deps.yml
    image: golang-release-image
    input_mapping:
      input_repo: bosh-backup-and-restore
    output_mapping:
      output_repo: bosh-backup-and-restore
    params:
      SOURCE_PATH: s3-config-validator/src/
  - task: test-unit-s3-config-validator
    file: bosh-backup-and-restore-ci/ci/tasks/test-unit-s3-config-validator/task.yml
    image: golang-registry-image
  - put: bosh-backup-and-restore
    params:
      repository: bosh-backup-and-restore
      rebase: true
